name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest

    env:
      QDRANT_URL: "https://dummy.qdrant.io:6333"
      QDRANT_API_KEY: "dummy"
      GROQ_API_KEY: "dummy"
      TAVILY_API_KEY: "dummy"
      MONGO_URL: ""

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        run: pytest tests/ -v

  docker:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - name: Build image
        run: docker build -t ntt-rag:${{ github.sha }} .
